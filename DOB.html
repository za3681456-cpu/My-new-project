<!DOCTYPE html>
<html>
<head>
<title>Age Calculator</title>

<style>

body{
    font-family: Arial;
    background:lightgoldenrodyellow;
}


.container{
    width:350px;
    background:white;
    padding:30px;
    margin:100px auto;
    text-align:center;
    border-radius:10px;
    box-shadow:0px 0px 10px #ccc;
}


input{
    width:100%;
    padding:10px;
    margin-top:10px;
    margin-bottom:20px;
    border:1px solid #ccc;
    border-radius:5px;
}


button{
    background:#007BFF;
    color:white;
    padding:10px 20px;
    border:none;
    border-radius:5px;
    cursor:pointer;
}


button:hover{
    background:#0056b3;
}


#result{
    margin-top:20px;
    color:green;
}

</style>

</head>

<body>

<div class="container">

<h2>Age Calculator</h2>

<label>Enter Your Birth Year</label>

<input type="number" id="birthYear" placeholder="Enter year">

<button onclick="calculateAge()">Calculate Age</button>

<h3 id="result"></h3>

</div>

<script>

function calculateAge(){

let birthYear = document.getElementById("birthYear").value;

let currentYear = new Date().getFullYear();

if(birthYear == ""){
document.getElementById("result").innerHTML = "Please enter birth year";
}

else{

let age = currentYear - birthYear;

document.getElementById("result").innerHTML = "Your Age is: " + age;

}

}

</script>

</body>
</html>
