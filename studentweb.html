<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Management System</title>

<!-- jQuery CDN -->
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

<style>
body {
    font-family: Arial, sans-serif;
    background: #f2f2f2;
    text-align: center;
}

.container {
    background: white;
    width: 400px;
    margin: 40px auto;
    padding: 20px;
    border-radius: 10px;
    box-shadow: 0 0 10px rgba(0,0,0,0.2);
}

input {
    width: 90%;
    padding: 8px;
    margin: 8px 0;
}

button {
    padding: 8px 12px;
    margin-top: 10px;
    cursor: pointer;
}

.student {
    background: #e8f0ff;
    margin: 10px 0;
    padding: 10px;
    border-radius: 5px;
}

.deleteBtn {
    background: red;
    color: white;
    border: none;
    margin-left: 10px;
}
</style>
</head>

<body>

<div class="container">
    <h2>Student Management System</h2>

    <form id="studentForm">
        <input type="text" id="name" placeholder="Enter Name" required>
        <input type="number" id="age" placeholder="Enter Age" required>
        <input type="text" id="course" placeholder="Enter Course" required>
        <br>
        <button type="submit">Add Student</button>
    </form>

    <h3>Student List</h3>
    <div id="studentList"></div>
</div>

<script>

// Array to store students
let students = [];

// Function to display students
function displayStudents() {
    $("#studentList").html("");

    students.forEach(function(student, index) {
        $("#studentList").append(`
            <div class="student">
                Name: ${student.name} | 
                Age: ${student.age} | 
                Course: ${student.course}
                <button class="deleteBtn" onclick="deleteStudent(${index})">Delete</button>
            </div>
        `);
    });
}

// Function to add student
function addStudent(name, age, course) {
    let student = {
        name: name,
        age: age,
        course: course
    };

    students.push(student);
    displayStudents();
}

// Function to delete student
function deleteStudent(index) {
    students.splice(index, 1);
    displayStudents();
}

// jQuery form submit event
$("#studentForm").submit(function(event) {
    event.preventDefault();

    let name = $("#name").val();
    let age = $("#age").val();
    let course = $("#course").val();

    addStudent(name, age, course);

    $("#studentForm")[0].reset();
});

</script>

</body>
</html>
